name: docker hello world
on: push
jobs:
  my-job:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: login azure
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: build docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/hello-python .  #creating my docker image as hellp-python
      - name: run docker container
        run: |
          docker run hello-python #running container with doc img.so default containar name it will take.
      - name: push docker img to acr
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/hello-python
    
