name: docker hello world
on: push
jobs:
  my-job:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: build docker image
        run: |
          docker build -t hello-python /app  #creating my docker image as hellp-python
      - name: run docker container
        run: |
          docker run hello-python #running container with doc img.so default containar name it will take.
    
