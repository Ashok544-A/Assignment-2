name: docker hello world
on: push
jobs:
  my-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: login azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: "dd5c5f7b-47a5-4145-b73f-2839a9a8f4b1"
      - name: azure login
        run: |
          az acr login --name demo38
        
      - name: build docker image
        run: |
          docker build -t demo38.azurecr.io/hello-python:latest .  #creating my docker image as hellp-python
      
      - name: push docker img to acr
        run: |
          docker push demo38.azurecr.io/hello-python:latest
    
